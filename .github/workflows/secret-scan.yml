name: Secret Scan

# Gitleaks secret scanning. This is the gate that would have caught the
# committed Bifrost vkeys. Fails the job on any finding.
# Uses the default gitleaks ruleset (no .gitleaks.toml required).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so pushes to main scan the whole commit range,
          # not just the tip.
          fetch-depth: 0

      # The gitleaks-action wrapper requires a paid org license key; the
      # CLI itself is MIT - run the pinned official release binary directly.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git --no-banner --redact --exit-code 1 .
