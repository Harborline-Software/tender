name: Secret Scan

# Gitleaks secret scanning. This is the gate that would have caught the
# committed Bifrost vkeys. Fails the job on any finding.
# Uses the default gitleaks ruleset (no .gitleaks.toml required).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so pushes to main scan the whole commit range,
          # not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
