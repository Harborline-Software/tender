name: Build & Test

# Closes the "Build & Test" gate advertised in AGENTS.md.
# Frontend: typecheck + build (+ optional test/lint if scripts exist).
# Rust/Tauri backend: fmt (advisory) + clippy (advisory) + cargo test (gating).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tender/apps/desktop
    steps:
      - uses: actions/checkout@v7
        with:
          path: tender

      # The main window consumes @shipyard/workspace-shell as a `file:` dependency
      # (../../../shipyard/packages/workspace-shell), and the package's source
      # reaches into shipyard/_shared/design. Check shipyard out as a sibling so
      # `npm ci` + the Vite build can resolve it (both repos are public, so the
      # default GITHUB_TOKEN suffices).
      #
      # `ref` is PINNED to a known-good shipyard SHA (code-review PR #103, V3):
      # without a pin, tender CI silently builds against shipyard main's moving
      # HEAD, so an unrelated shipyard change to workspace-shell/_shared/design
      # could break tender CI (or silently change bundled behavior) out-of-band.
      # Bump deliberately when the toolbox needs a newer shell.
      #
      # Sparse paths are a HAND-DERIVED subset (verified today: the shell's
      # runtime imports stay inside _shared/design) -- if the shell ever adds an
      # import outside this subtree, widen the sparse-checkout list below.
      - uses: actions/checkout@v7
        with:
          repository: Harborline-Software/shipyard
          ref: 8ab928dabcbb0d9c671de8434af5f68f232d5163 # main @ 2026-07-21; bump deliberately
          path: shipyard
          sparse-checkout: |
            packages/workspace-shell
            _shared/design
          sparse-checkout-cone-mode: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json found; falling back to npm install."
            npm install
          fi

      - name: Typecheck (tsc -b)
        run: npx tsc -b

      - name: Build
        run: npm run build --if-present

      - name: Lint (if a lint script exists)
        run: npm run lint --if-present

      - name: Test (if a test script exists)
        run: npm run test --if-present

  rust:
    name: Rust / Tauri backend
    # macos-latest: tender is a macOS-first Tauri app and its tests spawn the
    # macOS-only /usr/bin/ditto (src/install.rs), which fails on ubuntu. macOS
    # runner minutes are free on this public repo. WebKit ships natively on the
    # macOS image, so no GTK/webkit system packages need installing here.
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Format check (advisory)
        run: cargo fmt --check || echo "::warning::cargo fmt --check reported formatting drift (advisory, non-blocking)."

      - name: Clippy (advisory)
        # Advisory rather than -D warnings: this repo has not previously run
        # clippy in CI, so pre-existing lint debt should not hard-block the
        # first hardening pass. Correctness is gated by cargo test below.
        # Promote to `-D warnings` once the backlog is cleared.
        run: cargo clippy --no-deps || echo "::warning::cargo clippy reported findings (advisory, non-blocking)."

      - name: Test
        run: cargo test
