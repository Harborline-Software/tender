version: 2
updates:
  # Tender desktop app — npm (Tauri frontend)
  - package-ecosystem: npm
    directory: /apps/desktop
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
          - "tauri-*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  # Tender desktop app — Rust (Tauri backend)
  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    assignees:
      - "ctwoodwa"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
